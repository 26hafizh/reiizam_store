<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membuka WhatsApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.9);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --line: rgba(148, 163, 184, 0.22);
            --primary: #22c55e;
            --primary-ink: #052e16;
            --secondary: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(34, 197, 94, 0.2), transparent 45%),
                linear-gradient(180deg, #020617 0%, #0f172a 100%);
            color: var(--text);
        }

        .card {
            width: min(100%, 440px);
            padding: 28px 22px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
            backdrop-filter: blur(18px);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: #86efac;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: 1.9rem;
            line-height: 1.1;
        }

        .desc {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .product {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
        }

        .product strong {
            display: block;
            font-size: 1.05rem;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 22px;
        }

        .button,
        .ghost {
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border: 0;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .button {
            background: var(--primary);
            color: var(--primary-ink);
        }

        .ghost {
            background: var(--secondary);
            color: var(--text);
        }

        .hint {
            margin: 16px 0 0;
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.5;
            text-align: center;
        }

        .status {
            min-height: 1.3rem;
            margin-top: 10px;
            font-size: 0.92rem;
            color: #86efac;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">{{ store_name }}</p>
        <h1>Membuka WhatsApp...</h1>
        <p class="desc">Order untuk produk berikut sedang diarahkan ke aplikasi WhatsApp.</p>

        <section class="product">
            <strong>{{ item_name }}</strong>
            <span>{{ category_title }}</span>
        </section>

        <div class="actions">
            <a id="open-app" class="button" href="{{ wa_url }}">Buka WhatsApp Sekarang</a>
            <a id="open-fallback" class="ghost" href="{{ wa_url }}">Link Cadangan</a>
            <button id="copy-order" class="ghost" type="button">Salin Format Order</button>
        </div>

        <p id="status" class="status"></p>
        <p class="hint">Jika WhatsApp belum terbuka otomatis dalam 1-2 detik, tekan tombol di atas.</p>
    </main>

    <script>
        const WEB_URL = {{ wa_url|tojson }};
        const ORDER_TEXT = {{ order_text|tojson }};
        const statusNode = document.getElementById('status');
        const telegramApp = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        let isOpening = false;

        function setStatus(message) {
            statusNode.textContent = message;
        }

        function openWhatsApp() {
            if (isOpening) {
                return;
            }

            isOpening = true;
            setStatus('Membuka WhatsApp...');

            if (telegramApp && typeof telegramApp.openLink === 'function') {
                telegramApp.openLink(WEB_URL);
                window.setTimeout(() => {
                    isOpening = false;
                }, 900);
                return;
            }

            window.location.href = WEB_URL;
        }

        async function copyOrderText() {
            try {
                await navigator.clipboard.writeText(ORDER_TEXT);
                setStatus('Format order berhasil disalin.');
            } catch (error) {
                setStatus('Gagal menyalin format order.');
            }
        }

        document.getElementById('open-app').addEventListener('click', (event) => {
            event.preventDefault();
            openWhatsApp();
        });

        document.getElementById('open-fallback').addEventListener('click', () => {
            setStatus('Membuka link cadangan...');
        });

        document.getElementById('copy-order').addEventListener('click', copyOrderText);

        if (telegramApp) {
            telegramApp.ready();
            telegramApp.expand();
        }

        window.setTimeout(openWhatsApp, 120);
    </script>
</body>
</html>
