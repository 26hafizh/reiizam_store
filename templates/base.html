<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Reiizam Admin{% endblock %}</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Mobile Bottom Nav (Tampil hanya di mobile) -->
    <nav class="mobile-nav d-lg-none">
        <a href="/" class="nav-link-custom {% if request.url.path == '/' %}active{% endif %}">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/products" class="nav-link-custom {% if request.url.path == '/products' %}active{% endif %}">
            <i class="fa-solid fa-box-open"></i>
            <span>Produk</span>
        </a>
        <a href="/config" class="nav-link-custom {% if request.url.path == '/config' %}active{% endif %}">
            <i class="fa-solid fa-sliders"></i>
            <span>Setelan</span>
        </a>
        <a href="/logout" class="nav-link-custom text-danger">
            <i class="fa-solid fa-power-off"></i>
            <span>Out</span>
        </a>
    </nav>

    <!-- Desktop Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark d-none d-lg-block sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fa-solid fa-crown text-warning me-2"></i>REIIZAM ADMIN
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a href="/" class="nav-link px-3 {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="/products" class="nav-link px-3 {% if request.url.path == '/products' %}active{% endif %}">Produk</a>
                    </li>
                    <li class="nav-item">
                        <a href="/config" class="nav-link px-3 {% if request.url.path == '/config' %}active{% endif %}">Setelan</a>
                    </li>
                    <li class="nav-item ms-3">
                        <a href="/logout" class="btn btn-logout">
                            <i class="fa-solid fa-power-off me-2"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container container py-4 pb-5 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
