<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reiizam Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa-solid fa-rocket me-2"></i>REIIZAM ADMIN
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a href="/" class="nav-link px-3 text-white">
                            <i class="fa-solid fa-house me-2"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/products" class="nav-link px-3 text-white">
                            <i class="fa-solid fa-box-open me-2"></i>Produk
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/config" class="nav-link px-3 text-white">
                            <i class="fa-solid fa-sliders me-2"></i>Setelan
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="/logout" class="btn btn-sm btn-outline-danger px-3">
                            <i class="fa-solid fa-power-off me-2"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
