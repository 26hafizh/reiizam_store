<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Reiizam Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1d23 0%, #0f1115 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card card border-secondary border-opacity-25 shadow-lg mx-3">
        <div class="text-center">
            <div class="logo-circle">
                <i class="fa-solid fa-crown text-white fs-1"></i>
            </div>
            <h4 class="fw-bold mb-1">REIIZAM ADMIN</h4>
            <p class="text-muted small mb-4">Silakan masuk untuk mengelola toko.</p>
        </div>

        {% if error %}
        <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-20 text-danger small py-2 mb-4">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="{{ admin_login_url }}">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">USERNAME</label>
                <div class="input-group">
                    <span class="input-group-text bg-black border-secondary border-opacity-25 text-muted"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" name="username" placeholder="owner" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <div class="input-group">
                    <span class="input-group-text bg-black border-secondary border-opacity-25 text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" name="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">
                Masuk Sekarang <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </form>
    </div>
</body>
</html>
